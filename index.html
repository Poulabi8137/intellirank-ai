<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntelliRank AI</title>
    <!-- Theme initialization: runs synchronously before first paint to prevent FOUC -->
    <script>
      (function () {
        var stored = localStorage.getItem('intellirank-theme');
        var valid = ['light', 'dark'];
        if (stored && valid.indexOf(stored) !== -1) {
          document.documentElement.setAttribute('data-theme', stored);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
        // Light is the default: no attribute needed (CSS :root handles it)
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
